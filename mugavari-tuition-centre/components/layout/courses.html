<!-- ==================================================
     COURSES SECTION COMPONENT
     Pure Reusable Template
=================================================== -->

<section
    class="courses-section"
    id="courses-section"
    aria-labelledby="courses-title">

    <div class="container">

        <!-- Section Header -->

        <div class="section-header">

            <span
                class="section-badge"
                data-courses-badge>
            </span>

            <h2
                id="courses-title"
                class="section-title"
                data-courses-title>
            </h2>

            <p
                class="section-description"
                data-courses-description>
            </p>

        </div>

        <!-- Courses Grid -->

        <div
            class="courses-grid"
            data-courses-grid>

            <!--
                Course cards generated dynamically
                from courses.json using
                course-card-template
            -->

        </div>

    </div>

</section>
