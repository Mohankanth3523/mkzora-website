<!-- ==================================================
     HEADER COMPONENT
=================================================== -->

<header class="site-header" id="site-header" role="banner">

    <!-- Top Bar -->
    <div class="header-top">

        <div class="container">

            <div class="header-top-wrapper">

                <div
                    class="header-contact"
                    id="header-contact">

                    <!-- Loaded from contact.json -->

                </div>

                <div
                    class="header-social"
                    id="header-social">

                    <!-- Loaded from social-links.json -->

                </div>

            </div>

        </div>

    </div>

    <!-- Main Header -->

    <div class="header-main">

        <div class="container">

            <div class="header-wrapper">

                <!-- Logo -->

                <a
                    href="index.html"
                    class="site-logo"
                    aria-label="Mugavari Tuition Centre">

                    <img
                        data-logo
                        src=""
                        alt=""
                        width="180"
                        height="60"
                        loading="eager">

                </a>

                <!-- Navigation Component -->

                <div id="navigation-component"></div>

                <!-- Header CTA -->

                <div class="header-actions">

                    <a
                        data-cta-link
                        class="btn btn-primary">

                        <span data-cta-text></span>

                    </a>

                </div>

                <!-- Mobile Menu -->

                <button
                    id="mobile-menu-toggle"
                    class="mobile-menu-toggle"
                    type="button"
                    aria-label="Open Menu"
                    aria-expanded="false"
                    aria-controls="mobile-navigation">

                    <span></span>
                    <span></span>
                    <span></span>

                </button>

            </div>

        </div>

    </div>

</header>
