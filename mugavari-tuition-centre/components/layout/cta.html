<!-- ==================================================
     CALL TO ACTION COMPONENT
     Pure Reusable Template
=================================================== -->

<section
    class="cta-section"
    id="cta-section"
    aria-labelledby="cta-title">

    <div class="container">

        <div class="cta-wrapper">

            <!-- =============================================
                 CTA CONTENT
            ============================================== -->

            <div class="cta-content">

                <!-- Badge -->

                <span
                    class="cta-badge"
                    data-cta-badge>
                </span>

                <!-- Title -->

                <h2
                    id="cta-title"
                    class="cta-title"
                    data-cta-title>
                </h2>

                <!-- Description -->

                <p
                    class="cta-description"
                    data-cta-description>
                </p>

                <!-- Features -->

                <ul
                    class="cta-features"
                    data-cta-features>

                    <!--
                        Generated dynamically from
                        site-config.json
                    -->

                </ul>

            </div>

            <!-- =============================================
                 CTA ACTIONS
            ============================================== -->

            <div class="cta-actions">

                <!-- Primary Button -->

                <a
                    class="btn btn-primary"
                    data-cta-primary-link>

                    <span
                        data-cta-primary-text>
                    </span>

                </a>

                <!-- Secondary Button -->

                <a
                    class="btn btn-secondary"
                    data-cta-secondary-link>

                    <span
                        data-cta-secondary-text>
                    </span>

                </a>

            </div>

        </div>

    </div>

</section>
