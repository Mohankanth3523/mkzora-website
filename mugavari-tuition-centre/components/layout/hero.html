<!-- ==================================================
     HERO COMPONENT
     Pure Reusable Template
=================================================== -->

<section
    class="hero-section"
    id="hero-section"
    aria-labelledby="hero-title">

    <div class="container">

        <div class="hero-wrapper">

            <!-- =============================================
                 HERO CONTENT
            ============================================== -->

            <div class="hero-content">

                <!-- Hero Tag -->

                <span
                    class="hero-tag"
                    data-hero-tag>
                </span>

                <!-- Hero Title -->

                <h1
                    id="hero-title"
                    class="hero-title"
                    data-hero-title>
                </h1>

                <!-- Hero Description -->

                <p
                    class="hero-description"
                    data-hero-description>
                </p>

                <!-- Hero Highlights -->

                <ul
                    class="hero-highlights"
                    id="hero-highlights">

                    <!--
                        Loaded dynamically from
                        site-config.json
                    -->

                </ul>

                <!-- Hero Actions -->

                <div class="hero-actions">

                    <a
                        data-primary-button-link
                        class="btn btn-primary">

                        <span
                            data-primary-button-text>
                        </span>

                    </a>

                    <a
                        data-secondary-button-link
                        class="btn btn-outline">

                        <span
                            data-secondary-button-text>
                        </span>

                    </a>

                </div>

            </div>

            <!-- =============================================
                 HERO IMAGE
            ============================================== -->

            <div class="hero-media">

                <picture>

                    <source
                        data-hero-image-webp
                        srcset=""
                        type="image/webp">

                    <img
                        class="hero-image"
                        data-hero-image
                        src=""
                        alt=""
                        width="650"
                        height="650"
                        loading="eager"
                        fetchpriority="high">

                </picture>

            </div>

        </div>

    </div>

    <!-- =============================================
         HERO STATISTICS
    ============================================== -->

    <section
        class="hero-stats"
        aria-label="Institution Statistics">

        <div class="container">

            <div
                class="hero-stats-grid"
                id="hero-stats-grid">

                <!--
                    Statistics loaded dynamically
                    from site-config.json
                -->

            </div>

        </div>

    </section>

</section>
