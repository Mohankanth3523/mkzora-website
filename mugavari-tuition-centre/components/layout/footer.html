<!-- ==================================================
     FOOTER COMPONENT
     Pure Reusable Template
=================================================== -->

<footer
    class="site-footer"
    id="site-footer"
    role="contentinfo">

    <!-- =============================================
         FOOTER TOP
    ============================================== -->

    <div class="footer-top">

        <div class="container">

            <div class="footer-grid">

                <!-- =====================================
                     BRAND
                ====================================== -->

                <section
                    class="footer-brand"
                    aria-labelledby="footer-brand-title">

                    <a
                        href="index.html"
                        class="footer-logo"
                        aria-label="Home">

                        <img
                            data-footer-logo
                            src=""
                            alt=""
                            width="180"
                            height="60"
                            loading="lazy">

                    </a>

                    <h2
                        id="footer-brand-title"
                        class="visually-hidden">

                        Company Information

                    </h2>

                    <p
                        class="footer-description"
                        data-footer-description>
                    </p>

                </section>

                <!-- =====================================
                     QUICK LINKS
                ====================================== -->

                <nav
                    class="footer-navigation"
                    aria-labelledby="footer-navigation-title">

                    <h3
                        id="footer-navigation-title"
                        class="footer-title"
                        data-navigation-title>
                    </h3>

                    <ul
                        class="footer-links"
                        data-footer-navigation>

                        <!--
                            Generated dynamically
                            from navigation.json
                        -->

                    </ul>

                </nav>

                <!-- =====================================
                     COURSES
                ====================================== -->

                <section
                    class="footer-courses"
                    aria-labelledby="footer-course-title">

                    <h3
                        id="footer-course-title"
                        class="footer-title"
                        data-course-title>
                    </h3>

                    <ul
                        class="footer-links"
                        data-footer-courses>

                        <!--
                            Generated dynamically
                            from courses.json
                        -->

                    </ul>

                </section>

                <!-- =====================================
                     CONTACT
                ====================================== -->

                <section
                    class="footer-contact"
                    aria-labelledby="footer-contact-title">

                    <h3
                        id="footer-contact-title"
                        class="footer-title"
                        data-contact-heading>
                    </h3>

                    <address class="footer-address">

                        <p
                            data-footer-address>
                        </p>

                        <a
                            data-footer-phone-link
                            href="">

                            <span
                                data-footer-phone>
                            </span>

                        </a>

                        <a
                            data-footer-email-link
                            href="">

                            <span
                                data-footer-email>
                            </span>

                        </a>

                    </address>

                </section>

            </div>

        </div>

    </div>

    <!-- =============================================
         SOCIAL LINKS
    ============================================== -->

    <div class="footer-social">

        <div class="container">

            <div
                class="footer-social-links"
                data-footer-social>

                <!--
                    Generated dynamically
                    from social-links.json
                -->

            </div>

        </div>

    </div>

    <!-- =============================================
         FOOTER BOTTOM
    ============================================== -->

    <div class="footer-bottom">

        <div class="container">

            <div class="footer-bottom-wrapper">

                <p
                    class="footer-copyright"
                    data-footer-copyright>
                </p>

                <p
                    class="footer-developed-by">

                    <span
                        data-developed-label>
                    </span>

                    <a
                        data-developed-link
                        href=""
                        target="_blank"
                        rel="noopener noreferrer">

                        <span
                            data-developed-name>
                        </span>

                    </a>

                </p>

            </div>

        </div>

    </div>

    <!-- =============================================
         BACK TO TOP
    ============================================== -->

    <button
        id="back-to-top"
        class="back-to-top"
        type="button"
        aria-label="Back to Top">

        <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            aria-hidden="true">

            <path
                d="M12 5L5 12H10V19H14V12H19L12 5Z"
                fill="currentColor"/>

        </svg>

    </button>

</footer>
