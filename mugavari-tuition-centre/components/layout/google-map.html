<!-- ==================================================
     GOOGLE MAP COMPONENT
     Pure Reusable Template
=================================================== -->

<section
    class="location-section"
    id="location-section"
    aria-labelledby="location-title">

    <div class="container">

        <div class="location-wrapper">

            <!-- =============================================
                 SECTION HEADER
            ============================================== -->

            <header class="section-header">

                <span
                    class="section-badge"
                    data-location-badge>
                </span>

                <h2
                    id="location-title"
                    class="section-title"
                    data-location-title>
                </h2>

                <p
                    class="section-description"
                    data-location-description>
                </p>

            </header>

            <!-- =============================================
                 CONTENT
            ============================================== -->

            <div class="location-grid">

                <!-- =====================================
                     GOOGLE MAP
                ====================================== -->

                <div class="map-container">

                    <iframe
                        class="google-map"
                        data-map-src
                        src=""
                        title="Google Map"
                        loading="lazy"
                        allowfullscreen
                        referrerpolicy="no-referrer-when-downgrade">

                    </iframe>

                </div>

                <!-- =====================================
                     CONTACT CARD
                ====================================== -->

                <aside
                    class="contact-card"
                    aria-labelledby="contact-card-title">

                    <h3
                        id="contact-card-title"
                        class="contact-card-title"
                        data-contact-title>
                    </h3>

                    <!-- Address -->

                    <div class="contact-item">

                        <span class="contact-label">

                            Address

                        </span>

                        <address
                            class="contact-value"
                            data-address>
                        </address>

                    </div>

                    <!-- Phone -->

                    <div class="contact-item">

                        <span class="contact-label">

                            Phone

                        </span>

                        <a
                            class="contact-value"
                            data-phone-link
                            href="">

                            <span
                                data-phone>
                            </span>

                        </a>

                    </div>

                    <!-- Email -->

                    <div class="contact-item">

                        <span class="contact-label">

                            Email

                        </span>

                        <a
                            class="contact-value"
                            data-email-link
                            href="">

                            <span
                                data-email>
                            </span>

                        </a>

                    </div>

                    <!-- Working Hours -->

                    <div class="contact-item">

                        <span class="contact-label">

                            Working Hours

                        </span>

                        <div
                            class="contact-value"
                            data-working-hours>

                        </div>

                    </div>

                    <!-- Buttons -->

                    <div class="contact-actions">

                        <a
                            class="btn btn-primary"
                            data-direction-link
                            target="_blank"
                            rel="noopener noreferrer">

                            <span
                                data-direction-text>
                            </span>

                        </a>

                        <a
                            class="btn btn-outline"
                            data-call-link>

                            <span
                                data-call-text>
                            </span>

                        </a>

                    </div>

                </aside>

            </div>

        </div>

    </div>

</section>
