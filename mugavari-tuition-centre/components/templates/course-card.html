<!-- ==================================================
     COURSE CARD TEMPLATE
=================================================== -->

<template id="course-card-template">

    <article
        class="course-card"
        data-course-card>

        <!-- =============================================
             COURSE IMAGE
        ============================================== -->

        <div class="course-image-wrapper">

            <img
                class="course-image"
                data-course-image
                src=""
                alt=""
                width="400"
                height="280"
                loading="lazy">

            <span
                class="course-badge"
                data-course-badge>
            </span>

        </div>

        <!-- =============================================
             COURSE CONTENT
        ============================================== -->

        <div class="course-content">

            <div class="course-header">

                <span
                    class="course-category"
                    data-course-category>
                </span>

                <h3
                    class="course-title"
                    data-course-title>
                </h3>

            </div>

            <p
                class="course-description"
                data-course-description>
            </p>

            <!-- Course Features -->

            <ul
                class="course-features"
                data-course-features>

                <!-- Generated dynamically -->

            </ul>

        </div>

        <!-- =============================================
             COURSE META
        ============================================== -->

        <div class="course-meta">

            <div class="course-meta-item">

                <span class="meta-label">

                    Class

                </span>

                <span
                    class="meta-value"
                    data-course-class>
                </span>

            </div>

            <div class="course-meta-item">

                <span class="meta-label">

                    Subject

                </span>

                <span
                    class="meta-value"
                    data-course-subject>
                </span>

            </div>

            <div class="course-meta-item">

                <span class="meta-label">

                    Duration

                </span>

                <span
                    class="meta-value"
                    data-course-duration>
                </span>

            </div>

        </div>

        <!-- =============================================
             ACTION BUTTONS
        ============================================== -->

        <div class="course-actions">

            <a
                class="btn btn-outline"
                data-course-details-link>

                <span
                    data-course-details-text>
                </span>

            </a>

            <a
                class="btn btn-primary"
                data-course-enquiry-link>

                <span
                    data-course-enquiry-text>
                </span>

            </a>

        </div>

    </article>

</template>
