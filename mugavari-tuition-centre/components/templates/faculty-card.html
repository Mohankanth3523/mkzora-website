<!-- ==================================================
     FACULTY CARD TEMPLATE
=================================================== -->

<template id="faculty-card-template">

    <article
        class="faculty-card"
        data-faculty-card>

        <!-- =============================================
             FACULTY IMAGE
        ============================================== -->

        <div class="faculty-image-wrapper">

            <img
                class="faculty-image"
                data-faculty-image
                src=""
                alt=""
                width="400"
                height="450"
                loading="lazy">

            <span
                class="faculty-badge"
                data-faculty-badge>
            </span>

        </div>

        <!-- =============================================
             FACULTY CONTENT
        ============================================== -->

        <div class="faculty-content">

            <span
                class="faculty-department"
                data-faculty-department>
            </span>

            <h3
                class="faculty-name"
                data-faculty-name>
            </h3>

            <p
                class="faculty-designation"
                data-faculty-designation>
            </p>

            <p
                class="faculty-description"
                data-faculty-description>
            </p>

        </div>

        <!-- =============================================
             FACULTY INFORMATION
        ============================================== -->

        <div class="faculty-information">

            <div class="faculty-info-item">

                <span class="info-label">

                    Experience

                </span>

                <span
                    class="info-value"
                    data-faculty-experience>
                </span>

            </div>

            <div class="faculty-info-item">

                <span class="info-label">

                    Qualification

                </span>

                <span
                    class="info-value"
                    data-faculty-qualification>
                </span>

            </div>

            <div class="faculty-info-item">

                <span class="info-label">

                    Subject

                </span>

                <span
                    class="info-value"
                    data-faculty-subject>
                </span>

            </div>

        </div>

        <!-- =============================================
             EXPERTISE
        ============================================== -->

        <div
            class="faculty-expertise"
            data-faculty-expertise>

            <!-- Generated dynamically -->

        </div>

        <!-- =============================================
             SOCIAL LINKS
        ============================================== -->

        <div
            class="faculty-social-links"
            data-faculty-social-links>

            <!-- Generated dynamically -->

        </div>

        <!-- =============================================
             ACTIONS
        ============================================== -->

        <div class="faculty-actions">

            <a
                class="btn btn-outline"
                data-profile-link>

                <span
                    data-profile-text>
                </span>

            </a>

            <a
                class="btn btn-primary"
                data-contact-link>

                <span
                    data-contact-text>
                </span>

            </a>

        </div>

    </article>

</template>
