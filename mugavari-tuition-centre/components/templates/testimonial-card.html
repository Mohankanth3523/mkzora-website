<!-- ==================================================
     TESTIMONIAL CARD TEMPLATE
=================================================== -->

<template id="testimonial-card-template">

    <article
        class="testimonial-card"
        data-testimonial-card>

        <!-- =============================================
             HEADER
        ============================================== -->

        <header class="testimonial-header">

            <div class="testimonial-avatar">

                <img
                    class="testimonial-image"
                    data-testimonial-image
                    src=""
                    alt=""
                    width="80"
                    height="80"
                    loading="lazy">

            </div>

            <div class="testimonial-user">

                <span
                    class="testimonial-badge"
                    data-testimonial-badge>
                </span>

                <h3
                    class="testimonial-name"
                    data-testimonial-name>
                </h3>

                <p
                    class="testimonial-role"
                    data-testimonial-role>
                </p>

            </div>

        </header>

        <!-- =============================================
             RATING
        ============================================== -->

        <div
            class="testimonial-rating"
            data-testimonial-rating
            aria-label="Student Rating">

            <!-- Generated dynamically -->

        </div>

        <!-- =============================================
             CONTENT
        ============================================== -->

        <blockquote class="testimonial-content">

            <p
                data-testimonial-message>
            </p>

        </blockquote>

        <!-- =============================================
             FOOTER
        ============================================== -->

        <footer class="testimonial-footer">

            <div class="testimonial-meta">

                <div class="testimonial-meta-item">

                    <span class="meta-label">

                        Course

                    </span>

                    <span
                        class="meta-value"
                        data-testimonial-course>
                    </span>

                </div>

                <div class="testimonial-meta-item">

                    <span class="meta-label">

                        Batch

                    </span>

                    <span
                        class="meta-value"
                        data-testimonial-batch>
                    </span>

                </div>

                <div class="testimonial-meta-item">

                    <span class="meta-label">

                        Year

                    </span>

                    <span
                        class="meta-value"
                        data-testimonial-year>
                    </span>

                </div>

            </div>

        </footer>

    </article>

</template>
